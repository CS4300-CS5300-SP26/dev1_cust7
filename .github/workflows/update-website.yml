name: Deploy Main Branch to Website

on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run Commands on Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP_ADDR }}
          username: ${{ secrets.SERVER_ADMIN_USERNAME }}
          password: ${{ secrets.SERVER_ADMIN_PASSWORD }}
          script: |
            set -euo pipefail
            source cookBot_env/bin/activate
            cd dev1_cust7
            git fetch origin
            git reset --hard origin/main
            pip install -r requirements.txt
            cd cookBot
            python manage.py migrate
            python manage.py collectstatic --noinput --clear
            sleep 5
            systemctl restart cookBot
            sleep 5
            systemctl restart nginx
  uptime-check:
    needs: build
    uses: ./.github/workflows/website-monitor.yml
