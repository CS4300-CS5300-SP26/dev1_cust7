name: Deploy Main Branch to Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run Commands on Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP_ADDR }}
          username: ${{ secrets.SERVER_ADMIN_USERNAME }}
          password: ${{ secrets.SERVER_ADMIN_PASSWORD }}
          script: |
            set -euo pipefail
            systemctl stop cookBot
            source cookBot_env/bin/activate
            cd dev1_cust7
            git fetch origin
            git reset --hard origin/main
            pip install -r requirements.txt
            cd cookBot
            python manage.py migrate
            python manage.py collectstatic --noinput --clear
            systemctl start cookBot
            systemctl reload nginx
            for i in 1 2 3 4 5 6; do
              STATUS=$(curl -o /dev/null -s -w "%{http_code}" --connect-timeout 3 --max-time 10 htts://cookbot.me || true)
              echo "Attempt $i: Status $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "App is healthy"
                exit 0
              fi
              sleep 5
            done 
            echo "Autodeploy failed health check after retries"
            systemctl status cookBot --no-pager || true
            journalctl -u cookBot -n 100 --no-pager || true
            exit 1
  uptime-check:
    needs: build
    uses: ./.github/workflows/website-monitor.yml
