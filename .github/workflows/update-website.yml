name: Deploy Main Branch to Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run Commands on Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP_ADDR }}
          username: ${{ secrets.SERVER_ADMIN_USERNAME }}
          password: ${{ secrets.SERVER_ADMIN_PASSWORD }}
          script: |
            set -euo pipefail
            systemctl stop cookBot
            source cookBot_env/bin/activate
            cd dev1_cust7
            git fetch origin
            git reset --hard origin/main
            pip install -r requirements.txt
            cd cookBot
            python manage.py migrate
            python manage.py collectstatic --noinput --clear
            systemctl restart cookBot
            systemctl reload nginx
            for i in 1 2; do
              STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1:8000)
              echo "Attempt $i: Status $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "App is healthy"
                break
              fi
              if [ "$i" -eq 1 ]; then
                echo "App not ready, restarting cookBot..."
                systemctl restart cookBot
                sleep 5
              else
                echo "App failed after retry"
                exit 1
              fi
            done 
  uptime-check:
    needs: build
    uses: ./.github/workflows/website-monitor.yml
