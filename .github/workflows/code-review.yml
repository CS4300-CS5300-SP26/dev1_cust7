name: Pull Request Code Reveiw

on: 
  pull_request: 
    types: [opened, synchronize, reopened]
    branches-ignore:
      - 'dependabot/**'
permissions: 
  contents: read 
  pull-requests: write 
jobs: 
  code_reveiw: 
    runs-on: ubuntu-latest
    steps: 
      - name: Pull Repository 
        uses: actions/checkout@v4 
        with: 
          fetch-depth: 2 
      - name: Install Python 
        uses: actions/setup-python@v6 
        with: 
          python-version: '3.12.3' 
      - name: Install Dependencies 
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirements.txt 
          pip install openai
      - name: Get Pull Request difference and store in temporary file
        run: | 
          git fetch
          git diff origin/${{github.event.pull_request.base.ref}} > difference.txt
      - name: Run difference.txt through ai code review file
        env:
          OPENAI_API_KEY: ${{secrets.OPENAI_API_KEY}}
        run: |
          python code-review.py
      - name: Post code review as comment in pull request
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: feedback.txt
      - name: Clean up temporary files
        run: |
          rm difference.txt feedback.txt
          
            
        





