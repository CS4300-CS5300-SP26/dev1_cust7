name: Pull Request Code Reveiw

on: 
  pull_request: 
    types: [opened, synchronize, reopened] 
permissions: 
  contents: read 
  pull-requests: write 
jobs: 
  code_reveiw: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Pull Repository 
        uses: actions/checkout@v4 
        with: 
          fetch-depth: 2 
      - name: Install Python 
        uses: actions/setup-python@v6 
        with: 
          python-version: '3.11' 
      - name: Install Dependencies 
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirments.txt 
      - name: Get Pull Request difference and store in temporary file
        run: | 
          git fetch
          git diff origin/${{github.event.pull_request.base.ref}} > difference.txt
      - name: Run difference.txt through ai code reveiw file
        env:
          OPENAI_API_KEY: 
        
