name: Website Uptime Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  workflow_call:
  
jobs:
  check-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check Website Status
        id: check
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" https://cookbot.me)
          echo "Status Code: $STATUS"
          if [ "$STATUS" = "200" ]; then
          echo "state=up" >> "$GITHUB_OUTPUT"
          else
          echo "state=down" >> "$GITHUB_OUTPUT"
          fi
      - name: Notify Discord on failure
        if: steps.check.outputs.state == 'down' && github.event_name == 'schedule'
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"content":"The Cookbot website returned a non 200 level response, this might indicate that the website might be down at the moment."}' \
               ${{ secrets.DISCORD_DEV_CHANNEL_WEBHOOK }}
          
    
            

