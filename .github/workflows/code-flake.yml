name: Code Flake on Existing Code

on: 
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened] 
permissions: 
  contents: read 
  pull-requests: write 
jobs: 
  code_lint:
    runs-on: ubuntu-latest
    steps: 
      - name: Pull Repository 
        uses: actions/checkout@v4 
        with: 
          fetch-depth: 2 
      - name: Install Python
        uses: actions/setup-python@v6 
        with: 
          python-version: '3.12.3'
      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirements.txt 
          pip install ruff
      - name: Run Ruff and apply autofixes
        run: |
          ruff check --fix
          ruff format .
      - name: Fail if Ruff still finds issues
        run: | 
          ruff check --output-format=github
          ruff format --check .
      - name: Suggest Changes in PR for changes ruff finds
        if: always()
        uses: parkerbxyz/suggest-changes@v3
        with:
          comment: 'Ruff applied safe autofixes to code touched by this PR. Any remaining lint issues need manual fixes if action is failing'
          event: 'COMMENT'
          
        
      
        
        
          
          
