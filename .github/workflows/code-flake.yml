name: Code Flake on Existing Code

on: 
  pull_request: 
    branches: [main]
    types: [opened, synchronize, reopened] 
permissions: 
  contents: read 
  pull-requests: write 
jobs: 
  code_lint:
    runs-on: ubuntu-latest
    steps: 
      - name: Pull Repository 
        uses: actions/checkout@v4 
      - name: Install Python
        uses: actions/setup-python@v6 
        with: 
          python-version: '3.12.3'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirements.txt 
          pip install flake8 black
      - name: Run codebase through Black Formatter
        continue-on-error: true
        run: |
          black --check .
      - name: Run codebase through flake8
        continue-on-error: true
        run: |
          flake8 --ignore=E501 --output-file=flake8_results.txt .   
      - name: create Comment Formatting
        if: github.event_name == 'pull_request' && always()
        run: |
          {
            echo "## Linting Results"
            echo ""
            echo "### Black (Formatting)"
            if black --check . > /dev/null 2>&1; then
              echo "✅ Code is properly formatted"
            else
              echo "❌ Formatting issues detected (run \`black .\` locally)"
            fi
            echo ""
            echo "### Flake8 (Linting)"
            
            if [ -f flake8_results.txt ] && [ -s flake8_results.txt ]; then
              echo '```'
              cat flake8_results.txt
              echo '```'
            else
              echo "No flake8 issues found."
            fi 
          } > pr-comment.txt
      - name: Create PR Comment
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: 'code-flake'
          path: pr-comment.txt
      - name: Clean up temporary files
        if: always()
        run: |
          rm -f flake8_results.txt pr-comment.txt
