name: Code Flake on Existing Code

on: 
  pull_request: 
    branches: [main]
    types: [opened, synchronize, reopened] 
permissions: 
  contents: read 
  pull-requests: write 
jobs: 
  code_lint:
    runs-on: ubuntu-latest
    steps: 
      - name: Pull Repository 
        uses: actions/checkout@v4 
      - name: Install Python
        uses: actions/setup-python@v6 
        with: 
          python-version: '3.12.3'
      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirements.txt 
          pip install flake8
      - name: Run codebase through flake8
        run: |
          flake8 --output-file=flake8_results.txt ./dev1_cust7
      - name: create Comment Formatting
        if: github.event_name == 'pull_request' && always()
        run: |
          {
            echo "## Flake8 Results"
            echo ""
            echo '```'
            cat flake8_results.txt
            echo '```'
            echo ""
            
          } > pr-comment.txt
      - name: Create PR Comment
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: 'code-flake'
          path: pr-comment.txt
      - name: Clean up temporary files
        if: always()
        run: |
          rm -f flake8_results.txt pr-comment.txt
