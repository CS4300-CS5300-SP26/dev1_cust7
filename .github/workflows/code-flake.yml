name: Code Flake on Existing Code

on: 
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened] 
permissions: 
  contents: read 
  pull-requests: write 
jobs: 
  code_lint:
    runs-on: ubuntu-latest
    steps: 
      - name: Pull Repository 
        uses: actions/checkout@v4 
        with: 
          fetch-depth: 2 
      - name: Install Python
        uses: actions/setup-python@v6 
        with: 
          python-version: '3.12.3'
      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip 
          pip install -r requirements.txt 
          pip install ruff
      - name: Run codebase through ruff
        run: |
          ruff check | tee ruff_output.txt
      - name: Suggest Changes in PR for changes ruff finds
        if: always()
        uses: parkerbxyz/suggest-changes@v3
        with:
          comment: 'Ruff Linting Changes'
          event: 'REQUEST_CHANGES'
          
        
      
        
        
          
          
