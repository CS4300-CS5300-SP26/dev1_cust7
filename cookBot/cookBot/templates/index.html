{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inital-scale=1.0">
    <title>Cookbot</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
<!-- NAV formatting help from ChatGPT and https://www.w3schools.com/bootstrap/bootstrap_navbar.asp  -->
  <header class="navbar">
    <div class="container-fluid">
      <div class="nav-header">
        <a class="navbar-brand" href="#">
          <!-- Replace src with your logo-->
          <img src="logo.png" alt="CookBot Logo" onerror="this.style.display='none'">
          <div class="name">CookBot</div>
        </a>

        <nav class="nav-links">
            <!-- Temp links nowhere -->
            <li><a href="/">Home</a></li>
            <li><a href="/">AI Chef</a></li>
            <li><a href="/">Pantry</a></li>
            <li><a href="/">Meal Plan</a></li>
            <li><a href="/">Favorites</a></li>
        </nav>

        <a class="signin" href="/signin"> Sign In </a>
      </div>
    </div>
  </header>

  <!-- Banner background (simple format to edit hopefully) -->
  <main class="container banner">
    <section class="banner" role="banner" aria-label="Welcome">
      <div class="banner-content">
        <h1>Welcome to CookBot</h1>
        <p>Get ready to make mealplanning easy!</p>
      </div>
    </section>

    <!-- Search bar mainly made by ChatGPT as we are not entirely sure what the search bar is supposed to search so its just a giant dummy-->
    <section class="search-area" aria-label="Search links">
      <div class="search-wrap">
        <form class="search-bar" id="searchForm" autocomplete="off">
          <input
            id="searchInput"
            type="text"
            placeholder="Type here…"
            aria-label="Search for links"
          />
          <button class="search-btn" type="submit" aria-label="Search">
            ↑
          </button>
        </form>

        <div class="hint">Try: “chicken”, “meal plan”, “pantry”, “pasta”.</div>

        <div class="results" id="resultsBox">
          <h3 id="resultsTitle">Results</h3>
          <ul id="resultsList"></ul>
          <div class="empty" id="emptyState" style="display:none;">No matches found.</div>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
