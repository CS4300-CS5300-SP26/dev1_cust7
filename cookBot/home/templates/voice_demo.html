<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Assistant Demo</title>
</head>
<body>

<h1>Voice Cooking Assistant</h1>

<p id="stepText"></p>

<button onclick="speakCurrentStep()">🔊 Read Step</button>
<button onclick="nextStep()">⏭ Next Step</button>

<br><br>

<label>Voice:</label>
<select id="voiceSelect"></select>

<br><br>

<button onclick="startListening()">🎤 Start Listening</button>
<button onclick="stopListening()">🛑 Stop Listening</button>

<p><strong>Status:</strong> <span id="status">Idle</span></p>
<p><strong>Heard:</strong> <span id="heardText">...</span></p>

{{ steps_json|json_script:"steps-data" }}

<script>
/* -----------------------------
   DATA FROM DJANGO
----------------------------- */
const steps = {{ steps_json|safe }};
let currentStepIndex = 0;

/* -----------------------------
   UI UPDATE
----------------------------- */
function updateStep() {
    document.getElementById("stepText").innerText = steps[currentStepIndex];
}
updateStep();

/* -----------------------------
   TEXT TO SPEECH
----------------------------- */
let voices = [];

speechSynthesis.onvoiceschanged = () => {
    voices = speechSynthesis.getVoices();
    const select = document.getElementById("voiceSelect");

    voices.forEach((voice, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.text = `${voice.name} (${voice.lang})`;
        select.appendChild(option);
    });
};

function speak(text) {
    const utterance = new SpeechSynthesisUtterance(text);

    const selectedIndex = document.getElementById("voiceSelect").value;
    if (voices[selectedIndex]) {
        utterance.voice = voices[selectedIndex];
    }

    speechSynthesis.cancel(); // stop overlap
    speechSynthesis.speak(utterance);
}

function speakCurrentStep() {
    speak(steps[currentStepIndex]);
}

function nextStep() {
    if (currentStepIndex < steps.length - 1) {
        currentStepIndex++;
        updateStep();
        speak(steps[currentStepIndex]);
    } else {
        speak("You are at the final step.");
    }
}

/* -----------------------------
   SPEECH RECOGNITION
----------------------------- */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.continuous = true;
recognition.lang = "en-US";

/* -----------------------------
   WAKE WORD SYSTEM
----------------------------- */
let commandMode = false;
let commandTimeout;

function setStatus(text) {
    document.getElementById("status").innerText = text;
}

recognition.onresult = function(event) {
    const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();

    document.getElementById("heardText").innerText = transcript;

    // 🔑 Wake word detection
    if (transcript.includes("hey chef")) {
        commandMode = true;
        setStatus("Listening for command...");
        speak("Yes?");

        clearTimeout(commandTimeout);
        commandTimeout = setTimeout(() => {
            commandMode = false;
            setStatus("Idle");
        }, 5000);

        return;
    }

    // 🎯 Only process commands in command mode
    if (commandMode) {
        handleCommand(transcript);
        commandMode = false;
        setStatus("Idle");
    }
};

recognition.onend = () => {
    recognition.start(); // keep listening
};

function startListening() {
    recognition.start();
    setStatus("Listening...");
}

function stopListening() {
    recognition.stop();
    setStatus("Stopped");
}

/* -----------------------------
   COMMAND HANDLER
----------------------------- */
function handleCommand(command) {

    if (command.includes("next step")) {
        nextStep();
    }

    else if (command.includes("repeat")) {
        speak(steps[currentStepIndex]);
    }

    else if (command.includes("read step")) {
        const number = command.match(/\d+/);

        if (number) {
            const index = parseInt(number[0]) - 1;

            if (index >= 0 && index < steps.length) {
                currentStepIndex = index;
                updateStep();
                speak(steps[currentStepIndex]);
            } else {
                speak("That step does not exist.");
            }
        }
    }

    else {
        speak("Sorry, I didn't understand.");
    }
}
</script>

</body>
</html>
