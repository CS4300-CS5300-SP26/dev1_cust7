{% extends "navbar.html" %}
{% load static %}
{% block content %}
  <!-- Banner background (simple format to edit hopefully) -->
  <main class="container banner">
    <section class="banner" role="banner" aria-label="Welcome">
      <div class="banner-content">
        <h1>Welcome to CookBot</h1>
        <p>Get ready to make mealplanning easy!</p>
      </div>
      <div class="banner-art">
        <div class="art-bubble">
          <div class="art-card">
            <img src="{% static 'food1.png' %}" alt="foodImg" class="banner-image">
          </div>
        </div>
      </div>
    </section>

    <!-- Search bar mainly made by ChatGPT as we are not entirely sure what the search bar is supposed to search so its just a giant dummy-->
    <section class="search-area" aria-label="Search links">
      <div class="search-wrap">
        <form class="search-bar" id="searchForm" autocomplete="off">
          <input
            id="searchInput"
            type="text"
            placeholder="Type here…"
            aria-label="Search for links"
          />
          <button class="search-btn" type="submit" aria-label="Search">
            ↑
          </button>
        </form>

        <div class="hint">Try: “chicken”, “meal plan”, “French”, “pasta”.</div>

        <div class="results" id="resultsBox">
          <h3 id="resultsTitle">Results</h3>
          <ul id="resultsList"></ul>
          <div class="empty" id="emptyState" style="display:none;">No matches found.</div>
        </div>
      </div>
    </section>
  </main>
{% endblock %}
