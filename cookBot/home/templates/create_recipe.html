{% extends "navbar.html" %}
{% load static %}
 
{% block content %}
 
<div class="create-banner">
  <div class="create-banner-content">
    <h1>Create a Recipe</h1>
    <p>Share your culinary creations with the CookBot community</p>
  </div>
</div>
 
<div class="create-wrap">
 
  {% if error %}
    <div class="form-error-banner">{{ error }}</div>
  {% endif %}
 
  <form method="POST" class="recipe-form">
    {% csrf_token %}
 
    <!-- Title & Visibility -->
    <div class="form-card">
      <div class="form-card-title">Recipe Details</div>
 
      <div class="field-group">
        <label class="field-label" for="title">Recipe Title <span class="required">*</span></label>
        <input
          class="field-input"
          type="text"
          id="title"
          name="title"
          placeholder="e.g. Classic Spaghetti Carbonara"
          value="{{ post_data.title|default:'' }}"
          required
        >
      </div>
 
      <div class="field-group">
        <label class="toggle-label" for="is_public">
          <div class="toggle-text">
            <span class="field-label">Share to Social Feed</span>
            <span class="toggle-hint">Public recipes appear on the social page for all users to discover</span>
          </div>
          <div class="toggle-track">
            <input type="checkbox" id="is_public" name="is_public" class="toggle-input"
              {% if post_data.is_public %}checked{% endif %}>
            <span class="toggle-thumb"></span>
          </div>
        </label>
      </div>
    </div>
 
    <!-- Ingredients -->
    <div class="form-card">
      <div class="form-card-title">Ingredients</div>
      <div id="ingredients-container">
        <div class="ingredient-row">
          <input class="field-input qty-input" type="number" name="ingredient_quantity[]"
            placeholder="Qty" min="0.001" step="0.0001" required>
          <select class="field-input unit-select" name="ingredient_unit[]">
            <option value="">— unit —</option>
            <option value="cups">cup</option>
            <option value="grams">g</option>
            <option value="lbs">lb</option>
            <option value="tablespoons">tbsp</option>
            <option value="teaspoons">tsp</option>
            <option value="ozs">oz</option>
          </select>
          <input class="field-input name-input" type="text" name="ingredient_name[]"
            placeholder="Ingredient name" required>
          <button type="button" class="remove-btn" onclick="removeRow(this)" aria-label="Remove">&#x2715;</button>
        </div>
      </div>
      <button type="button" class="add-btn" onclick="addIngredient()">+ Add Ingredient</button>
    </div>
 
    <!-- Steps -->
    <div class="form-card">
      <div class="form-card-title">Steps</div>
      <div id="steps-container">
        <div class="step-row">
          <div class="step-number">1</div>
          <textarea class="field-input step-textarea" name="steps[]"
            placeholder="Describe this step…" required></textarea>
          <button type="button" class="remove-btn" onclick="removeRow(this)" aria-label="Remove">&#x2715;</button>
        </div>
      </div>
      <button type="button" class="add-btn" onclick="addStep()">+ Add Step</button>
    </div>
 
    <div class="form-actions">
      <a href="/" class="cancel-btn">Cancel</a>
      <button type="submit" class="submit-btn">Create Recipe</button>
    </div>
 
  </form>
</div>
 
<style>
  /* ── Banner ── */
  .create-banner {
    background: linear-gradient(120deg, #009470, #42a06d);
    padding: 2.5rem 5%;
    display: flex;
    align-items: center;
  }
 
  .create-banner-content h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #ffffff;
    margin: 0 0 0.3rem;
  }
 
  .create-banner-content p {
    color: #ffffff;
    font-size: 1rem;
    margin: 0;
    opacity: 0.9;
  }
 
  /* ── Page wrapper ── */
  .create-wrap {
    max-width: 720px;
    margin: 2rem auto;
    padding: 0 1.5rem 4rem;
  }
 
  /* ── Error banner ── */
  .form-error-banner {
    background: #fff3f3;
    border: 1px solid #f5c0c0;
    color: #c0392b;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin-bottom: 1.25rem;
    font-size: 0.9rem;
  }
 
  /* ── Cards ── */
  .form-card {
    background: #ffffff;
    border: 1.5px solid #d7ebe3;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
 
  .form-card-title {
    font-size: 1rem;
    font-weight: 700;
    color: #1a3d2b;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1.5px solid #d7ebe3;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
 
  /* ── Fields ── */
  .field-group {
    margin-bottom: 1rem;
  }
 
  .field-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 700;
    color: #1a3d2b;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
 
  .required { color: #e74c3c; }
 
  .field-input {
    width: 100%;
    padding: 0.65rem 1rem;
    border: 1.5px solid #d7ebe3;
    border-radius: 999px;
    font-size: 0.95rem;
    background: #f9fcfa;
    color: #1a3d2b;
    box-sizing: border-box;
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
 
  .field-input:focus {
    outline: none;
    border-color: #009470;
    box-shadow: 0 0 0 3px rgba(0, 148, 112, 0.12);
    background: #ffffff;
  }
 
  /* textarea overrides pill shape */
  textarea.field-input {
    border-radius: 12px;
    resize: vertical;
    min-height: 80px;
  }
 
  select.field-input {
    appearance: none;
    cursor: pointer;
  }
 
  /* ── Toggle ── */
  .toggle-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 1rem;
  }
 
  .toggle-text {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
 
  .toggle-hint {
    font-size: 0.82rem;
    color: #9ab8ac;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }
 
  .toggle-track {
    position: relative;
    flex-shrink: 0;
    width: 48px;
    height: 26px;
  }
 
  .toggle-input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }
 
  .toggle-thumb {
    display: block;
    width: 48px;
    height: 26px;
    background: #d7ebe3;
    border-radius: 999px;
    position: relative;
    transition: background 0.2s;
    cursor: pointer;
  }
 
  .toggle-thumb::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: #ffffff;
    border-radius: 50%;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
  }
 
  .toggle-input:checked + .toggle-thumb {
    background: #009470;
  }
 
  .toggle-input:checked + .toggle-thumb::after {
    transform: translateX(22px);
  }
 
  /* ── Ingredient rows ── */
  .ingredient-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }
 
  .qty-input   { width: 85px;  flex-shrink: 0; }
  .unit-select { width: 95px;  flex-shrink: 0; }
  .name-input  { flex: 1; }
 
  /* ── Step rows ── */
  .step-row {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }
 
  .step-number {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    background: #009470;
    color: #ffffff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 800;
    margin-top: 0.6rem;
  }
 
  .step-textarea { flex: 1; }
 
  /* ── Buttons ── */
  .remove-btn {
    background: none;
    border: 1.5px solid #d7ebe3;
    border-radius: 50%;
    color: #9ab8ac;
    cursor: pointer;
    font-size: 0.8rem;
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s;
    margin-top: 0.55rem;
    padding: 0;
  }
 
  .remove-btn:hover {
    border-color: #e74c3c;
    color: #e74c3c;
  }
 
  .add-btn {
    background: none;
    border: 1.5px dashed #d7ebe3;
    border-radius: 999px;
    color: #9ab8ac;
    cursor: pointer;
    font-size: 0.88rem;
    font-family: inherit;
    padding: 0.5rem 1.25rem;
    margin-top: 0.25rem;
    width: 100%;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
 
  .add-btn:hover {
    border-color: #009470;
    color: #009470;
    background: #f0faf7;
  }
 
  .form-actions {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 1rem;
    margin-top: 0.5rem;
  }
 
  .cancel-btn {
    font-size: 0.9rem;
    color: #9ab8ac;
    text-decoration: none;
    padding: 0.6rem 1.25rem;
    border-radius: 999px;
    border: 1.5px solid #d7eba3;
    transition: color 0.15s, border-color 0.15s;
  }
 
  .cancel-btn:hover {
    color: #1a3d2b;
    border-color: #1a3d2b;
  }
 
  .submit-btn {
    background: #009470;
    color: #ffffff;
    border: none;
    border-radius: 999px;
    padding: 0.65rem 2rem;
    font-size: 0.95rem;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
 
  .submit-btn:hover  { background: #42a06d; }
  .submit-btn:active { transform: scale(0.97); }
</style>
 
<script>
  function renumberSteps() {
    document.querySelectorAll('#steps-container .step-number').forEach((el, i) => {
      el.textContent = i + 1;
    });
  }
 
  function addIngredient() {
    const container = document.getElementById('ingredients-container');
    const row = container.querySelector('.ingredient-row').cloneNode(true);
    row.querySelectorAll('input').forEach(i => i.value = '');
    row.querySelector('select').selectedIndex = 0;
    container.appendChild(row);
  }
 
  function addStep() {
    const container = document.getElementById('steps-container');
    const row = container.querySelector('.step-row').cloneNode(true);
    row.querySelector('textarea').value = '';
    container.appendChild(row);
    renumberSteps();
  }
 
  function removeRow(btn) {
    const row = btn.closest('.ingredient-row, .step-row');
    const container = row.parentElement;
    if (container.children.length > 1) {
      row.remove();
      renumberSteps();
    }
  }
</script>
 
{% endblock %}
