{% extends "navbar.html" %}
{% load static %}
 
{% block content %}

<link rel="stylesheet" href="{% static 'create_recipe.css' %}">

<div class="create-banner">
  <div class="create-banner-content">
    <h1>Create a Recipe</h1>
    <p>Share your culinary creations with the CookBot community</p>
  </div>
</div>
 
<div class="create-wrap">
 
  {% if error %}
    <div class="form-error-banner">{{ error }}</div>
  {% endif %}
 
<form method="POST" enctype="multipart/form-data" class="recipe-form">
    {% csrf_token %}
 
    <!-- Title & Visibility -->
    <div class="form-card">
      <div class="form-card-title">Recipe Details</div>
 
      <div class="field-group">
        <label class="field-label" for="title">Recipe Title <span class="required">*</span></label>
        <input
          class="field-input"
          type="text"
          id="title"
          name="title"
          placeholder="e.g. Classic Spaghetti Carbonara"
          value="{{ post_data.title|default:'' }}"
          required
        >
      </div>
      <div class="field-group">
        <label class="field-label" for="description">Description</label>
        <textarea
          class="field-input"
          id="description"
          name="description"
          rows="4"
          placeholder="Briefly describe the recipe..."
          >{{ post_data.description|default:'' }}
        </textarea>  
      </div>
      <div class="field-group">
        <label class="field-label" for="image">Recipe Image</label>
        <input
          class="field-input"
          type="file"
          id="image"
          name="image"
          accept="image/*"
        >
      </div>
      <div class="field-group">
        <label class="toggle-label" for="is_public">
          <div class="toggle-text">
            <span class="field-label">Share to Social Feed</span>
            <span class="toggle-hint">Public recipes appear on the social page for all users to discover</span>
          </div>
          <div class="toggle-track">
            <input type="checkbox" id="is_public" name="is_public" class="toggle-input"
              {% if post_data.is_public %}checked{% endif %}>
            <span class="toggle-thumb"></span>
          </div>
        </label>
      </div>
    </div>
 
    <!-- Ingredients -->
    <div class="form-card">
      <div class="form-card-title">Ingredients</div>
      <div id="ingredients-container">
        <div class="ingredient-row">
          <input class="field-input qty-input" type="number" name="ingredient_quantity[]"
            placeholder="Qty" min="0.001" step="0.0001" required>
          <select class="field-input unit-select" name="ingredient_unit[]">
            <option value="">— unit —</option>
            <option value="cups">cup</option>
            <option value="grams">g</option>
            <option value="lbs">lb</option>
            <option value="tablespoons">tbsp</option>
            <option value="teaspoons">tsp</option>
            <option value="ozs">oz</option>
          </select>
          <input class="field-input name-input" type="text" name="ingredient_name[]"
            placeholder="Ingredient name" required>
          <button type="button" class="remove-btn" onclick="removeRow(this)" aria-label="Remove">&#x2715;</button>
        </div>
      </div>
      <button type="button" class="add-btn" onclick="addIngredient()">+ Add Ingredient</button>
    </div>
 
    <!-- Steps -->
    <div class="form-card">
      <div class="form-card-title">Steps</div>
      <div id="steps-container">
        <div class="step-row">
          <div class="step-number">1</div>
          <textarea class="field-input step-textarea" name="steps[]"
            placeholder="Describe this step…" required></textarea>
          <button type="button" class="remove-btn" onclick="removeRow(this)" aria-label="Remove">&#x2715;</button>
        </div>
      </div>
      <button type="button" class="add-btn" onclick="addStep()">+ Add Step</button>
    </div>
 
    <div class="form-actions">
      <a href="/" class="cancel-btn">Cancel</a>
      <button type="submit" class="submit-btn">Create Recipe</button>
    </div>
 
  </form>
</div>

<script src="{% static 'create_recipe.js' %}"></script>
 
{% endblock %}
