{% extends 'navbar.html' %}
{% load static %}

{% block content %}
<!-- FullCalendar.io CSS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' rel='stylesheet' />

<!-- Banner -->
<section class="calendar-banner">
  <div class="calendar-banner-content">
    <h1>Meal Calendar</h1>
    <p>Plan and track your meals for the week ahead.</p>
  </div>
</section>

<!-- Meal Plan Generator -->
<div class="meal-plan-controls">

  <!-- Macro inputs -->
  <div class="macro-inputs">
    <div class="macro-field">
      <label for="calories">Calories</label>
      <input type="number" id="calories" placeholder="e.g. 500" min="0">
    </div>
    <div class="macro-field">
      <label for="protein">Protein (g)</label>
      <input type="number" id="protein" placeholder="e.g. 30" min="0">
    </div>
    <div class="macro-field">
      <label for="fat">Fat (g)</label>
      <input type="number" id="fat" placeholder="e.g. 15" min="0">
    </div>
    <div class="macro-field">
      <label for="carbs">Carbs (g)</label>
      <input type="number" id="carbs" placeholder="e.g. 50" min="0">
    </div>
  </div>
  <!-- Cuisine input -->
  <div class="cuisine-input">
    <label for="cuisine">Cuisine Preference</label>
    <input type="text" id="cuisine" placeholder="e.g. Mexican, Italian, Japanese...">
  </div>

  <!-- Pantry toggle -->
  <div class="pantry-toggle-row">
    <label class="toggle-label" for="use-pantry">Use Pantry Items</label>
    <label class="toggle-switch">
      <input type="checkbox" id="use-pantry">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <!-- Generate button -->
  <button id="generate-plan-btn">
    Generate Weekly Plan
  </button>
  <div id="generate-message"></div>

</div>

<!-- API endpoints (used by JavaScript) -->
<div id="calendar-api-endpoints" 
     data-get-meals-url="{% url 'get_meals' %}" 
     data-generate-meal-plan-url="{% url 'generate_meal_plan' %}"
     style="display: none;">
</div>

<link rel="stylesheet" href="{% static 'calendar.css' %}">

<!-- Calendar container -->
<div id='calendar'></div>

<!-- FullCalendar.io JS -->
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<script src="{% static 'calendar.js' %}"></script>
{% endblock %}
