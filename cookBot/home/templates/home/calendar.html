{% extends 'navbar.html' %}
{% load static %}

{% block content %}
<!-- FullCalendar.io CSS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' rel='stylesheet' />

<!-- Banner -->
<section class="calendar-banner">
  <div class="calendar-banner-content">
    <h1>Meal Calendar</h1>
    <p>Plan and track your meals for the week ahead.</p>
  </div>
</section>

<!-- Generate Button -->
<div style="text-align: center; margin-bottom: 20px;">
    <button id="generate-plan-btn" class="auth-btn" style="padding: 12px 24px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer;">
        Generate Weekly Plan
    </button>
    <div id="generate-message" style="margin-top: 10px; font-weight: 500;"></div>
</div>

<!-- API endpoints (used by JavaScript) -->
<div id="calendar-api-endpoints" 
     data-get-meals-url="{% url 'get_meals' %}" 
     data-generate-meal-plan-url="{% url 'generate_meal_plan' %}"
     style="display: none;">
</div>

<link rel="stylesheet" href="{% static 'calendar.css' %}">

<!-- Calendar container -->
<div id='calendar'></div>

<!-- FullCalendar.io JS -->
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
<script src="{% static 'calendar.js' %}"></script>
{% endblock %}
